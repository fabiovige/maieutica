services:

  # ── PHP-FPM 8.2 ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maieutica_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - maieutica_network
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: maieutica_nginx
    restart: unless-stopped
    ports:
      - "8080:80"   # Acesse em http://localhost:8080
    volumes:
      - .:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - maieutica_network
    depends_on:
      - app

  # ── MariaDB 10.11 LTS (mesma versão da produção Hostinger) ───────
  db:
    image: mariadb:10.11
    container_name: maieutica_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: maieutica
      MARIADB_USER: maieutica
      MARIADB_PASSWORD: secret
    ports:
      - "3306:3306"   # HeidiSQL: host=127.0.0.1, porta=3306, user=root, senha=root
    volumes:
      - maieutica_db_data:/var/lib/mysql
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - maieutica_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  maieutica_db_data:
    driver: local

networks:
  maieutica_network:
    driver: bridge
